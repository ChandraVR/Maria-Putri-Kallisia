<!DOCTYPE html>
<html>
<head>
  <title>Mini Website Interaktif ❤️</title>
</head>
<body>

  <h1 id="teks">Hai Kamu Yang Disana🫵</h1>
  <button id="tombol1">Klik aku</button>

  <div id="container"></div> <!-- Tempat tombol baru dan GIF -->

  <script>
    // Tombol pertama
    document.getElementById("tombol1").addEventListener("click", function() {
      // Tambah tulisan
      document.getElementById("teks").innerText += " I Love You!❤️";
      // Hapus tombol lama
      this.remove();

      // Buat tombol baru
      let tombolBaru = document.createElement("button");
      tombolBaru.innerText = "Klik lagi 😳";

      // Saat tombol baru diklik
      tombolBaru.addEventListener("click", function() {
        document.getElementById("teks").innerText = "Aku serius loh ❤️";

        // Hapus tombol kedua
        this.remove();

        // Tambah GIF
        let gambar = document.createElement("img");
        gambar.src = "bubu-sad-dudu.gif"; // Ganti sesuai path GIF-mu
        gambar.width = 200; // Atur lebar sesuai kebutuhan

        document.getElementById("container").appendChild(gambar);
      });

      // Tambahkan tombol baru ke container
      document.getElementById("container").appendChild(tombolBaru);
    });
  </script>

</body>
</html>
